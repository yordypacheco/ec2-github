AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 creada desde GitHub Actions

Resources:

  MyEC2:
    Type: AWS::EC2::Instance

    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro

      UserData:
        Fn::Base64: |
          #!/bin/bash

          yum update -y

          yum install -y \
            git \
            htop \
            tree \
            docker

          systemctl enable docker
          systemctl start docker

          cat > /etc/motd << 'EOF'

          ███████╗ ██████╗██████╗
          ██╔════╝██╔════╝╚════██╗
          █████╗  ██║      █████╔╝
          ██╔══╝  ██║     ██╔═══╝
          ███████╗╚██████╗███████╗
          ╚══════╝ ╚═════╝╚══════╝

          🚀 EC2 creada desde GitHub Actions
          🐳 Docker Instalado
          ⚡ UserData Ejecutada Correctamente

          EOF

          echo 'export PS1="\[\e[1;32m\][\u@\h]\[\e[0m\] \[\e[1;34m\]\w\[\e[0m\] \$ "' >> /etc/bashrc

          mkdir /workspace

      Tags:
        - Key: Name
          Value: EC2-GitHubActions