```yaml
AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Web Server desde GitHub Actions

Resources:

  # ==========================================
  # SECURITY GROUP
  # ==========================================
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup

    Properties:
      GroupDescription: Permitir SSH y HTTP

      SecurityGroupIngress:

        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        # HTTP
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # ==========================================
  # EC2 INSTANCE
  # ==========================================
  MyEC2:
    Type: AWS::EC2::Instance

    Properties:

      ImageId: ami-0c101f26f147fa7fd
      InstanceType: t2.micro

      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: "0"
          GroupSet:
            - !Ref EC2SecurityGroup

      UserData:
        Fn::Base64: |
          #!/bin/bash

          yum update -y

          amazon-linux-extras install nginx1 -y || yum install -y nginx

          systemctl enable nginx
          systemctl start nginx

          cat > /usr/share/nginx/html/index.html <<EOF
          <!DOCTYPE html>
          <html lang="es">

          <head>

            <meta charset="UTF-8">

            <title>AWS EC2</title>

            <style>

              body {
                background: #0f172a;
                color: white;
                font-family: Arial, sans-serif;
                text-align: center;
                padding-top: 100px;
              }

              .container {
                width: 700px;
                margin: auto;
                background: #1e293b;
                padding: 50px;
                border-radius: 20px;
                box-shadow: 0px 0px 30px rgba(0,0,0,0.6);
              }

              h1 {
                font-size: 55px;
                color: #38bdf8;
              }

              p {
                font-size: 24px;
              }

              h2 {
                color: #facc15;
              }

            </style>

          </head>

          <body>

            <div class="container">

              <h1>EC2 DEPLOYADA</h1>

              <p>
                Servidor creado desde GitHub Actions
              </p>

              <p>
                CloudFormation + UserData + NGINX
              </p>

              <h2>AWS DEVOPS MODE</h2>

            </div>

          </body>

          </html>
          EOF

      Tags:
        - Key: Name
          Value: EC2-GitHubActions
```
