AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Web Server desde GitHub Actions

Resources:

  # ==========================================
  # SECURITY GROUP
  # ==========================================
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup

    Properties:
      GroupDescription: Permitir HTTP y SSH

      SecurityGroupIngress:

        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        # HTTP
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # ==========================================
  # EC2
  # ==========================================
  MyEC2:
    Type: AWS::EC2::Instance

    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro

      SecurityGroupIds:
        - !Ref EC2SecurityGroup

      UserData:
        Fn::Base64: |
          #!/bin/bash

          yum update -y

          # Instalar nginx
          yum install -y nginx git docker htop tree

          # Iniciar nginx
          systemctl enable nginx
          systemctl start nginx

          # P√°gina HTML bonita
          cat > /usr/share/nginx/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>EC2 GitHub Actions</title>

            <style>
              body{
                background:#0f172a;
                color:white;
                font-family:Arial;
                text-align:center;
                padding-top:100px;
              }

              h1{
                font-size:60px;
                color:#38bdf8;
              }

              p{
                font-size:24px;
              }

              .box{
                background:#1e293b;
                width:700px;
                margin:auto;
                padding:40px;
                border-radius:20px;
                box-shadow:0 0 30px rgba(0,0,0,.5);
              }
            </style>

          </head>

          <body>

            <div class="box">
              <h1>ūüöÄ EC2 DEPLOYADA</h1>

              <p>
                Servidor creado desde GitHub Actions
              </p>

              <p>
                CloudFormation + UserData + NGINX
              </p>

              <h2>ūüĒ• AWS DEVOPS MODE ūüĒ•</h2>
            </div>

          </body>
          </html>
          EOF

