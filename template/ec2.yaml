AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Web Server desde GitHub Actions

Resources:

  # ==========================================
  # SECURITY GROUP
  # ==========================================
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup

    Properties:
      GroupDescription: Permitir HTTP y SSH

      SecurityGroupIngress:

        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        # HTTP
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  # ==========================================
  # EC2
  # ==========================================
  MyEC2:
    Type: AWS::EC2::Instance

    Properties:

      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro

      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: "0"
          GroupSet:
            - !Ref EC2SecurityGroup

      UserData:
        Fn::Base64: |
          #!/bin/bash

          yum update -y

          # Instalar nginx y herramientas
          yum install -y nginx git docker htop tree

          # Iniciar nginx
          systemctl enable nginx
          systemctl start nginx

          # Crear página web
          cat > /usr/share/nginx/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">

          <head>

            <meta charset="UTF-8">

            <title>EC2 Web Server</title>

            <style>

              body {
                background: #0f172a;
                color: #ffffff;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                text-align: center;
                padding-top: 80px;
              }

              .container {
                background: #1e293b;
                width: 700px;
                margin: auto;
                padding: 50px;
                border-radius: 20px;
                box-shadow: 0 0 40px rgba(0,0,0,0.7);
              }

              h1 {
                font-size: 50px;
                color: #38bdf8;
                margin-bottom: 20px;
              }

              p {
                font-size: 20px;
                line-height: 1.6;
                margin: 10px 0;
              }

              h2 {
                color: #facc15;
                margin-top: 30px;
              }

            </style>

          </head>

          <body>

            <div class="container">

              <h1>🚀 EC2 DEPLOYADA</h1>

              <p>
                Servidor creado desde <strong>GitHub Actions</strong>
              </p>

              <p>
                CloudFormation + UserData + NGINX
              </p>

              <h2>🔥 AWS DEVOPS MODE 🔥</h2>

            </div>

          </body>

          </html>
          EOF

          # Banner terminal
          cat > /etc/motd << 'EOF'

          ███████╗ ██████╗██████╗
          ██╔════╝██╔════╝╚════██╗
          █████╗  ██║      █████╔╝
          ██╔══╝  ██║     ██╔═══╝
          ███████╗╚██████╗███████╗
          ╚══════╝ ╚═════╝╚══════╝

          🚀 EC2 creada desde GitHub Actions
          🌐 NGINX instalado
          🐳 Docker instalado

          EOF

      Tags:
        - Key: Name
          Value: EC2-GitHubActions